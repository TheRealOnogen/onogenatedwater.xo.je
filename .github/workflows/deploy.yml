name: Deploy to InfinityFree
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install Tools
        run: apk add --no-cache git lftp
      - name: Checkout
        run: |
          git clone --depth 1 -b main https://github.com/TheRealOnogen/onogenatedwater.xo.je.git .

      - name: Deploy via LFTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -e "set ftp:ssl-allow no; \
          open $FTP_HOST; \
          user $FTP_USER $FTP_PASS; \
          mirror --reverse --delete --verbose --no-perms \
          --exclude .git/ \
          --exclude .gitea/ \
          --exclude README.md \
          ./ /htdocs/; \
          bye"
