<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Misc</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    font-family: 'Quicksand', sans-serif;
    overflow-y: auto;
}

canvas {
    position: fixed;
    inset: 0;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
}

/* Keep content above canvas */
#title, #projects {
    position: relative;
    z-index: 1;
}

#title {
    text-align: center;
    font-size: 36px;
    font-weight: 600;
    color: #7fd4ff;
    text-shadow: 0 0 20px rgba(0,180,255,.6),
                 0 0 40px rgba(0,120,255,.4);
    margin-top: 24px;
}

#subtitle {
    margin-top: 6px;
    font-size: 14px;
    opacity: .7;
}

#projects {
    display: flex;
    flex-wrap: wrap;        /* side by side */
    justify-content: center;
    gap: 30px;
    color: #9adfff;
    margin: 80px auto 100px;
    max-width: 1000px;
    padding: 0 10px;
}

#projects h2 {
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
    font-weight: 500;
    font-size: 28px;
    text-shadow: 0 0 15px rgba(0,150,255,.6);
}

/* Compact boxes matching text */
.project-box {
    flex: 0 1 auto;          /* shrink to text size */
    max-width: 300px;
    padding: 20px 25px;
    background: rgba(0,40,90,0.85);
    backdrop-filter: blur(14px);
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(0,160,255,.4),
                inset 0 0 25px rgba(0,120,255,.35);
    text-align: center;
    font-size: 18px;
    font-weight: 600;
}

.project-box a {
    color: #7fd4ff;
    text-decoration: none;
}

.project-box a:hover {
    text-decoration: underline;
}

.project-desc {
    margin-top: 8px;
    font-size: 14px;
    opacity: .85;
}

/* Bottom button */
.bottom-container {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

.bottom-box {
    padding: 12px 30px;
    background: rgba(0,40,90,0.85);
    backdrop-filter: blur(14px);
    border-radius: 14px;
    box-shadow: 0 0 20px rgba(0,160,255,.4),
                inset 0 0 20px rgba(0,120,255,.35);
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    color: #7fd4ff;
}

.bottom-box:hover {
    text-decoration: underline;
}

@media (max-width: 600px) {
    #title { font-size: 28px; }
    #projects h2 { font-size: 24px; }
}
</style>
</head>

<body>

<div id="title">
Misc page
<div id="subtitle">Random stuff</div>
</div>

<div id="projects">
<h2>Pages</h2>

<div class="project-box">
<a href="Cool_people">Cool People</a>
<div class="project-desc">
Cool People list
</div>
</div>

<div class="project-box">
<a href="Uncool_people">Uncool People</a>
<div class="project-desc">
Uncool People list
</div>
</div>

<div class="project-box">
<a href="Staff">Staff</a>
<div class="project-desc">
Staff list
</div>
</div>

<div class="project-box">
<a href="buttadawg">Butta dawg</a>
<div class="project-desc">
Butta dawg
</div>
</div>

</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

let mouseX = 0, mouseY = 0;
window.addEventListener("mousemove", e => {
    mouseX = (e.clientX / innerWidth - .5) * 2;
    mouseY = (e.clientY / innerHeight - .5) * 2;
});

const ORB_COUNT = 14;
const orbs = [];

function rand(a,b){ return Math.random()*(b-a)+a }

function randomBlue(){
    const m = Math.random();
    if(m < .33) return `rgb(${rand(0,30)|0},${rand(80,160)|0},255)`
    if(m < .66) return `rgb(0,${rand(180,240)|0},255)`
    return `rgb(${rand(40,100)|0},${rand(140,200)|0},255)`
}

class Orb{
    constructor(){ this.reset(); }
    reset(){
        this.x = rand(-300, canvas.width+300);
        this.y = rand(-300, canvas.height+300);
        this.r = rand(250,520);
        this.dx = rand(-.5,.5);
        this.dy = rand(-.5,.5);
        this.depth = rand(.2,1);
        this.color = randomBlue();
        this.alpha = 0;
    }
    update(){
        this.x += this.dx;
        this.y += this.dy;
        this.alpha = Math.min(this.alpha + .003, 1);
        if(this.x < -900 || this.x > canvas.width+900 ||
           this.y < -900 || this.y > canvas.height+900){
            this.reset();
        }
    }
    draw(){
        const px = this.x + mouseX*80*this.depth;
        const py = this.y + mouseY*80*this.depth;
        const g = ctx.createRadialGradient(px,py,0,px,py,this.r);
        g.addColorStop(0,this.color);
        g.addColorStop(1,"transparent");
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(px,py,this.r,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

for(let i=0;i<ORB_COUNT;i++) orbs.push(new Orb());

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const o of orbs){
        o.update();
        o.draw();
    }
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
